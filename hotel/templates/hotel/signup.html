<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — The Grand Crimson</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'hotel/css/styles.css' %}">
</head>

<body class="auth-page">

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <i class="bi bi-building"></i> The Grand <span>Crimson</span>
            </a>
            <a href="{% url 'home' %}" class="btn btn-outline-light btn-sm rounded-pill">
                <i class="bi bi-arrow-left"></i> Back to Home
            </a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-10">
                    <div class="auth-card reveal">
                        <div class="auth-header text-center">
                            <h2 class="auth-title">Create Account</h2>
                            <p class="auth-subtitle">Join us for premium luxury and exclusive offers</p>
                        </div>
                        <form id="signupForm" class="auth-form mt-4">
                            <div class="row">
                                <div class="col-md-12 mb-3">
                                    <label for="fullName" class="form-label">Full Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                                        <input type="text" class="form-control" id="fullName" placeholder="John Doe" required>
                                    </div>
                                </div>
                                <div class="col-md-12 mb-3">
                                    <label for="regEmail" class="form-label">Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                        <input type="email" class="form-control" id="regEmail" placeholder="name@email.com" required>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="regPassword" class="form-label">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                        <input type="password" class="form-control" id="regPassword" placeholder="••••••••" required>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                                        <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••" required>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" id="terms" required>
                                <label class="form-check-label" for="terms">
                                    I agree to the <a href="#" class="text-crimson">Terms of Service</a> and <a href="#" class="text-crimson">Privacy Policy</a>
                                </label>
                            </div>
                            
                            <button type="submit" class="btn btn-crimson btn-lg w-100 mb-3">
                                <i class="bi bi-person-plus"></i> Create Account
                            </button>
                            
                            <div class="auth-divider">
                                <span>or sign up with</span>
                            </div>
                            
                            <div class="social-auth d-flex flex-column flex-sm-row gap-3 mb-4">
                                <button type="button" class="btn btn-outline-secondary w-100">
                                    <i class="bi bi-google"></i> Google
                                </button>
                                <button type="button" class="btn btn-outline-secondary w-100">
                                    <i class="bi bi-facebook"></i> Facebook
                                </button>
                            </div>
                            
                            <p class="text-center mb-0 text-muted">
                                Already have an account? <a href="{% url 'login' %}" class="text-crimson fw-bold">Sign In</a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'hotel/js/script.js' %}"></script>
</body>

</html>
